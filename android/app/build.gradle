plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
    id "com.google.gms.google-services"
}

android {
    namespace "com.caify.gtmservice"
    compileSdk 34

    defaultConfig {
        applicationId "com.caify.gtmservice"
        minSdk 21
        targetSdk 34
        versionCode 2
        versionName "1.0.1"
    }

    buildTypes {
        debug {
            shrinkResources false
            minifyEnabled false
        }
        release {
            signingConfig signingConfigs.debug
            shrinkResources false
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = "1.8"
    }
}

flutter {
    source "../.."
}
