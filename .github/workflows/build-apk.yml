name: Build APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.2'
          channel: 'stable'
          cache: true

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses || true

      - name: Create google-services.json
        run: |
          cat > android/app/google-services.json << 'EOF'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "gtm-service-test",
              "storage_bucket": "gtm-service-test.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:0000000000000000",
                  "android_client_info": {
                    "package_name": "com.caify.gtmservice"
                  }
                },
                "oauth_client": [
                  {
                    "client_id": "000000000000-placeholder.apps.googleusercontent.com",
                    "client_type": 3
                  }
                ],
                "api_key": [{"current_key": "placeholder"}],
                "services": {"appinvite_service": {"other_platform_oauth_client": []}}
              }
            ],
            "configuration_version": "1"
          }
          EOF

      - name: flutter pub get
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --debug --no-shrink

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: gtm-service-debug
          path: build/app/outputs/flutter-apk/app-debug.apk

      - name: Create/Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-latest
          name: "GTM Service Test APK (debug)"
          body: |
            GTM + GA4 OAuth 기능 테스트용 안드로이드 앱 (debug 빌드)

            **설치 방법**: apk 파일 다운로드 → 안드로이드에서 설치 (알 수 없는 소스 허용)
          files: build/app/outputs/flutter-apk/app-debug.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
